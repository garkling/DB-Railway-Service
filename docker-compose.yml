services:
  db:
    image: mysql:8.4
    container_name: railway-mysql
    restart: unless-stopped
    command: --local-infile=1
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: railway_service
    ports:
      - "3306:3306"
    volumes:
      - railway-mysql-data:/var/lib/mysql
      - ./seeds:/var/lib/mysql-files
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-psecret"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    container_name: railway-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://root:secret@db:3306/railway_service?local_infile=1
      DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app
      - ./sql:/code/sql
      - ./tests:/code/tests
      - ./seeds:/var/lib/mysql-files
      - ./migrations:/code/migrations
      - ./migrate.py:/code/migrate.py

volumes:
  railway-mysql-data:
